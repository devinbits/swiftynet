name: Release

# Builds and publishes a signed, notarized macOS release when a version tag is pushed.
#
# Required GitHub repository secrets:
#   APPLE_DEVELOPER_TEAM_ID       - Apple Developer Team ID
#   BUILD_CERTIFICATE_BASE64      - Developer ID Application .p12 (base64-encoded)
#   P12_PASSWORD                  - Password for the .p12 certificate
#   KEYCHAIN_PASSWORD             - Password for the temporary CI keychain
#   APPLE_ID                      - Apple ID used for notarization
#   APPLE_APP_SPECIFIC_PASSWORD   - App-specific password for notarization

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
        run: |
          xcodebuild \
            -project SwiftyNet.xcodeproj \
            -scheme SwiftyNet \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/SwiftyNet.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            archive

      - name: Export app
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/SwiftyNet.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="$RUNNER_TEMP/export/SwiftyNet.app"
          ZIP_PATH="$RUNNER_TEMP/SwiftyNet-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "${{ secrets.APPLE_DEVELOPER_TEAM_ID }}" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package release ZIP
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="SwiftyNet-v${VERSION}-macos.zip"
          ditto -c -k --keepParent "$RUNNER_TEMP/export/SwiftyNet.app" "$RUNNER_TEMP/$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SwiftyNet v${{ steps.package.outputs.version }}
          generate_release_notes: true
          files: ${{ runner.temp }}/${{ steps.package.outputs.zip_name }}
